<!DOCTYPE html>
<html>
<head>
    <title>Test Firebase Functions</title>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js';
        import { getFunctions, httpsCallable } from 'https://www.gstatic.com/firebasejs/9.6.1/firebase-functions.js';

        const firebaseConfig = {
            apiKey: "AIzaSyB2LPmuXM2WZp6aB6vrSxs5NFNP4CIVApE",
            authDomain: "bowersworld-digital-alexandria.firebaseapp.com",
            projectId: "our-library-d7b60",
            storageBucket: "our-library-d7b60.firebasestorage.app",
            messagingSenderId: "486786884647",
            appId: "1:486786884647:web:85806a519fe582e6fd5a02"
        };

        const app = initializeApp(firebaseConfig);
        const functions = getFunctions(app);

        // Make functions available globally for testing
        window.testVerificationEmail = async function(email) {
            try {
                const sendVerificationEmail = httpsCallable(functions, 'sendVerificationEmail');
                const result = await sendVerificationEmail({ email });
                console.log('✅ Verification email sent:', result.data);
                alert('Verification email sent successfully!');
                return result.data;
            } catch (error) {
                console.error('❌ Error:', error);
                alert('Error: ' + error.message);
            }
        };

        window.testPasswordResetEmail = async function(email) {
            try {
                const sendPasswordResetEmail = httpsCallable(functions, 'sendPasswordResetEmail');
                const result = await sendPasswordResetEmail({ email });
                console.log('✅ Password reset email sent:', result.data);
                alert('Password reset email sent successfully!');
                return result.data;
            } catch (error) {
                console.error('❌ Error:', error);
                alert('Error: ' + error.message);
            }
        };
    </script>
</head>
<body>
    <h1>Firebase Functions Email Test</h1>
    
    <div style="margin: 20px;">
        <h3>Test Verification Email</h3>
        <input type="email" id="verifyEmail" placeholder="Enter email address" style="padding: 10px; width: 300px;">
        <button onclick="testVerificationEmail(document.getElementById('verifyEmail').value)" style="padding: 10px;">
            Send Verification Email
        </button>
    </div>

    <div style="margin: 20px;">
        <h3>Test Password Reset Email</h3>
        <input type="email" id="resetEmail" placeholder="Enter email address" style="padding: 10px; width: 300px;">
        <button onclick="testPasswordResetEmail(document.getElementById('resetEmail').value)" style="padding: 10px;">
            Send Password Reset Email
        </button>
    </div>

    <div style="margin: 20px; padding: 10px; background-color: #f0f0f0;">
        <h4>How to Test:</h4>
        <ol>
            <li>Enter your email address</li>
            <li>Click the test button</li>
            <li>Check your email inbox</li>
            <li>Check browser console for detailed logs</li>
        </ol>
    </div>
</body>
</html>
