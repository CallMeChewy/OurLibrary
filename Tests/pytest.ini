[tool:pytest]
# Pytest configuration for OurLibrary testing

# Test discovery
testpaths = Tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    unit: Unit tests for core functionality
    integration: Integration tests for cross-component workflows
    security: Security-focused testing
    firebase: Firebase-specific testing  
    smtp: SMTP email service testing
    auth: Authentication system testing
    browser: Browser functionality testing
    ui: User interface testing
    config: Configuration validation testing
    credentials: Credential security testing
    live: Live website testing (requires internet)
    educational_mission: Educational mission-critical features
    performance: Performance and benchmarking tests
    api: API endpoint testing
    database: Database operations testing
    google_drive: Google Drive integration testing

# Output and reporting
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --disable-warnings

# Test filtering
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Minimum version requirements
minversion = 7.0

# Test discovery patterns
norecursedirs = 
    .git
    .tox
    dist
    build
    *.egg
    __pycache__
    .venv
    venv