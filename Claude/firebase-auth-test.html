<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Auth Test</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            max-width: 600px; 
            margin: 50px auto; 
            padding: 20px;
            background: #1a1a1a;
            color: white;
        }
        input, button { 
            display: block; 
            width: 100%; 
            padding: 10px; 
            margin: 10px 0; 
            border: 1px solid #444;
            background: #333;
            color: white;
            border-radius: 5px;
        }
        button { 
            background: #0066cc; 
            cursor: pointer; 
        }
        .result { 
            background: #333; 
            padding: 15px; 
            margin: 20px 0; 
            border-radius: 5px;
            white-space: pre-wrap;
        }
        .success { border-left: 4px solid #00cc66; }
        .error { border-left: 4px solid #cc0000; }
    </style>
</head>
<body>
    <h1>🔥 Firebase Authentication Test</h1>
    <p>Direct test of Firebase account creation</p>

    <div>
        <h3>Test Firebase Account Creation</h3>
        <input type="email" id="testEmail" placeholder="Test Email" value="test@example.com">
        <input type="password" id="testPassword" placeholder="Test Password" value="test123456">
        <button onclick="testFirebaseAuth()">Create Firebase Account</button>
    </div>

    <div id="results"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

        // Firebase configuration from console
        const firebaseConfig = {
            apiKey: "AIzaSyAsG8hleX4WRKCLcIJdWkcNptWNMGdNjzk",
            authDomain: "our-library-d7b60.firebaseapp.com",
            projectId: "our-library-d7b60",
            storageBucket: "our-library-d7b60.firebasestorage.app",
            messagingSenderId: "71206584632",
            appId: "1:71206584632:web:61a21f2d08b9e318dfc1cd",
            measurementId: "G-XL47Q42LB8"
        };

        console.log('🔥 Initializing Firebase...');
        console.log('Config:', firebaseConfig);

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            
            console.log('✅ Firebase initialized successfully');
            console.log('Auth instance:', auth);
            
            window.firebaseAuth = auth;
            window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
            
            document.getElementById('results').innerHTML = `
                <div class="result success">✅ Firebase initialized successfully
Project: ${firebaseConfig.projectId}
Auth Domain: ${firebaseConfig.authDomain}
Ready to test account creation!</div>
            `;
            
        } catch (error) {
            console.error('❌ Firebase initialization error:', error);
            document.getElementById('results').innerHTML = `
                <div class="result error">❌ Firebase initialization failed:
${error.message}
Code: ${error.code}</div>
            `;
        }

        window.testFirebaseAuth = async function() {
            const email = document.getElementById('testEmail').value;
            const password = document.getElementById('testPassword').value;
            const resultsDiv = document.getElementById('results');
            
            resultsDiv.innerHTML = '<div class="result">🔄 Testing Firebase account creation...</div>';
            
            try {
                console.log('🧪 Testing account creation for:', email);
                
                const userCredential = await window.createUserWithEmailAndPassword(
                    window.firebaseAuth, 
                    email, 
                    password
                );
                
                const user = userCredential.user;
                console.log('✅ SUCCESS! Firebase account created:', user);
                
                resultsDiv.innerHTML = `
                    <div class="result success">🎉 SUCCESS! Firebase account created:

User ID: ${user.uid}
Email: ${user.email}
Email Verified: ${user.emailVerified}
Creation Time: ${user.metadata.creationTime}
Provider: ${user.providerData[0]?.providerId || 'email'}

✅ Firebase Authentication is working correctly!</div>
                `;
                
            } catch (error) {
                console.error('❌ Firebase account creation error:', error);
                console.error('Error code:', error.code);
                console.error('Error message:', error.message);
                
                let errorExplanation = '';
                switch(error.code) {
                    case 'auth/email-already-in-use':
                        errorExplanation = '\nThis email is already registered. Try a different email or use the login function.';
                        break;
                    case 'auth/operation-not-allowed':
                        errorExplanation = '\n🚨 EMAIL/PASSWORD AUTHENTICATION IS NOT ENABLED in Firebase Console!\nGo to: Firebase Console > Authentication > Sign-in method > Enable Email/Password';
                        break;
                    case 'auth/weak-password':
                        errorExplanation = '\nPassword is too weak. Use at least 6 characters.';
                        break;
                    case 'auth/invalid-email':
                        errorExplanation = '\nInvalid email format.';
                        break;
                    default:
                        errorExplanation = '\nUnexpected error. Check Firebase project settings.';
                }
                
                resultsDiv.innerHTML = `
                    <div class="result error">❌ Firebase Account Creation FAILED:

Error Code: ${error.code}
Error Message: ${error.message}${errorExplanation}</div>
                `;
            }
        };
    </script>
</body>
</html>
