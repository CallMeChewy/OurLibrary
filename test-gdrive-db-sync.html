<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OurLibrary - Google Drive Database Sync Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
</head>
<body class="bg-gray-100 min-h-screen py-8">
    <div class="container mx-auto px-4 max-w-4xl">
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Google Drive Database Sync Test</h1>
            <p class="text-gray-600">Test Google Drive database synchronization functionality</p>
        </div>

        <!-- Sync Status -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">Sync Status</h2>
            <div id="syncStatus" class="space-y-2">
                <p class="text-gray-600">Loading sync status...</p>
            </div>
            <div class="mt-4 space-x-4">
                <button id="checkUpdatesBtn" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                    Check for Updates
                </button>
                <button id="forceSyncBtn" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
                    Force Sync
                </button>
                <button id="refreshStatusBtn" class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">
                    Refresh Status
                </button>
            </div>
        </div>

        <!-- Database Info -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">Database Information</h2>
            <div id="databaseInfo" class="space-y-2">
                <p class="text-gray-600">Loading database info...</p>
            </div>
        </div>

        <!-- Configuration -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">Configuration</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Database File ID</label>
                    <input id="databaseFileId" type="text" placeholder="Enter Google Drive file ID" 
                           class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="flex items-center space-x-2">
                    <input id="autoSyncEnabled" type="checkbox" class="rounded">
                    <label for="autoSyncEnabled" class="text-sm text-gray-700">Enable automatic sync</label>
                </div>
                <button id="saveConfigBtn" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                    Save Configuration
                </button>
            </div>
        </div>

        <!-- Activity Log -->
        <div class="bg-white rounded-lg shadow-lg p-6">
            <h2 class="text-xl font-semibold mb-4">Activity Log</h2>
            <div id="activityLog" class="bg-gray-50 p-4 rounded-lg max-h-64 overflow-y-auto">
                <p class="text-gray-500 text-sm">Activity log will appear here...</p>
            </div>
            <div class="mt-2">
                <button id="clearLogBtn" class="bg-red-500 text-white px-3 py-1 rounded text-sm hover:bg-red-600">
                    Clear Log
                </button>
            </div>
        </div>
    </div>

    <!-- Load Scripts -->
    <script src="/JS/database.js"></script>
    <script src="/JS/database-sync.js"></script>

    <script>
        // Test interface functionality
        class DatabaseSyncTestInterface {
            constructor() {
                this.syncManager = null;
                this.databaseManager = null;
                this.activityLog = [];
                
                this.initializeInterface();
            }

            async initializeInterface() {
                this.log('Initializing database sync test interface...');
                
                // Wait for global instances to be available
                await this.waitForInstances();
                
                this.syncManager = window.ourLibraryDBSync;
                this.databaseManager = window.ourLibraryDB;
                
                this.setupEventListeners();
                this.refreshStatus();
                this.loadConfiguration();
                
                this.log('Interface initialized successfully');
            }

            async waitForInstances() {
                let attempts = 0;
                while ((!window.ourLibraryDBSync || !window.ourLibraryDB) && attempts < 50) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                    attempts++;
                }
                
                if (!window.ourLibraryDBSync || !window.ourLibraryDB) {
                    this.log('Warning: Some instances not available after waiting');
                }
            }

            setupEventListeners() {
                document.getElementById('checkUpdatesBtn').addEventListener('click', () => {
                    this.checkForUpdates();
                });
                
                document.getElementById('forceSyncBtn').addEventListener('click', () => {
                    this.forceSync();
                });
                
                document.getElementById('refreshStatusBtn').addEventListener('click', () => {
                    this.refreshStatus();
                });
                
                document.getElementById('saveConfigBtn').addEventListener('click', () => {
                    this.saveConfiguration();
                });
                
                document.getElementById('clearLogBtn').addEventListener('click', () => {
                    this.clearLog();
                });

                // Setup database update callback
                window.onDatabaseUpdated = () => {
                    this.log('Database updated successfully!');
                    this.refreshStatus();
                };
            }

            async refreshStatus() {
                this.log('Refreshing sync status...');
                
                try {
                    if (this.syncManager) {
                        const status = this.syncManager.getSyncStatus();
                        this.displaySyncStatus(status);
                    }
                    
                    if (this.databaseManager && this.databaseManager.isInitialized) {
                        const stats = this.databaseManager.getStats();
                        this.displayDatabaseInfo(stats);
                    } else {
                        this.displayDatabaseInfo({ message: 'Database not initialized' });
                    }
                    
                } catch (error) {
                    this.log(`Error refreshing status: ${error.message}`);
                }
            }

            displaySyncStatus(status) {
                const statusElement = document.getElementById('syncStatus');
                statusElement.innerHTML = `
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <strong>Last Sync:</strong> ${status.lastSyncTime ? status.lastSyncTime.toLocaleString() : 'Never'}
                        </div>
                        <div>
                            <strong>Current Version:</strong> ${status.currentVersion || 'Unknown'}
                        </div>
                        <div>
                            <strong>Sync Configured:</strong> <span class="${status.syncConfigured ? 'text-green-600' : 'text-red-600'}">${status.syncConfigured ? 'Yes' : 'No'}</span>
                        </div>
                        <div>
                            <strong>Next Sync Due:</strong> ${status.nextSyncDue.toLocaleString()}
                        </div>
                    </div>
                `;
            }

            displayDatabaseInfo(stats) {
                const infoElement = document.getElementById('databaseInfo');
                if (stats.message) {
                    infoElement.innerHTML = `<p class="text-gray-600">${stats.message}</p>`;
                } else {
                    infoElement.innerHTML = `
                        <div class="grid grid-cols-3 gap-4">
                            <div class="text-center">
                                <div class="text-2xl font-bold text-blue-600">${stats.totalBooks || 0}</div>
                                <div class="text-sm text-gray-600">Total Books</div>
                            </div>
                            <div class="text-center">
                                <div class="text-2xl font-bold text-green-600">${stats.totalCategories || 0}</div>
                                <div class="text-sm text-gray-600">Categories</div>
                            </div>
                            <div class="text-center">
                                <div class="text-2xl font-bold text-purple-600">${stats.totalSubjects || 0}</div>
                                <div class="text-sm text-gray-600">Subjects</div>
                            </div>
                        </div>
                    `;
                }
            }

            async checkForUpdates() {
                this.log('Checking for database updates...');
                
                try {
                    if (this.syncManager) {
                        const hasUpdates = await this.syncManager.checkForUpdates();
                        if (hasUpdates) {
                            this.log('Database updated from Google Drive');
                        } else {
                            this.log('No updates available');
                        }
                    } else {
                        this.log('Sync manager not available');
                    }
                } catch (error) {
                    this.log(`Error checking updates: ${error.message}`);
                }
                
                this.refreshStatus();
            }

            async forceSync() {
                this.log('Force syncing database...');
                
                try {
                    if (this.syncManager) {
                        const result = await this.syncManager.forcSync();
                        this.log(result ? 'Force sync completed' : 'Force sync failed');
                    } else {
                        this.log('Sync manager not available');
                    }
                } catch (error) {
                    this.log(`Error during force sync: ${error.message}`);
                }
                
                this.refreshStatus();
            }

            loadConfiguration() {
                const fileId = localStorage.getItem('test_database_file_id') || '';
                const autoSync = localStorage.getItem('test_auto_sync') !== 'false';
                
                document.getElementById('databaseFileId').value = fileId;
                document.getElementById('autoSyncEnabled').checked = autoSync;
            }

            saveConfiguration() {
                const fileId = document.getElementById('databaseFileId').value;
                const autoSync = document.getElementById('autoSyncEnabled').checked;
                
                localStorage.setItem('test_database_file_id', fileId);
                localStorage.setItem('test_auto_sync', autoSync.toString());
                
                // Update sync manager configuration
                if (this.syncManager) {
                    this.syncManager.databaseFileId = fileId;
                    this.syncManager.setAutoSync(autoSync);
                }
                
                this.log('Configuration saved');
                this.refreshStatus();
            }

            log(message) {
                const timestamp = new Date().toLocaleTimeString();
                const logEntry = `[${timestamp}] ${message}`;
                this.activityLog.unshift(logEntry);
                
                // Keep only last 50 entries
                if (this.activityLog.length > 50) {
                    this.activityLog = this.activityLog.slice(0, 50);
                }
                
                this.updateLogDisplay();
            }

            updateLogDisplay() {
                const logElement = document.getElementById('activityLog');
                logElement.innerHTML = this.activityLog
                    .map(entry => `<div class="text-sm text-gray-700 mb-1">${entry}</div>`)
                    .join('');
                
                // Auto-scroll to top
                logElement.scrollTop = 0;
            }

            clearLog() {
                this.activityLog = [];
                this.updateLogDisplay();
            }
        }

        // Initialize the test interface when page loads
        document.addEventListener('DOMContentLoaded', () => {
            window.testInterface = new DatabaseSyncTestInterface();
        });
    </script>
</body>
</html>
